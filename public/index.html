<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DevOps Node Work</title>
    </head>
    <body>
        <h1>Welcome to DevOps Node Work</h1>
        <a href="/json">json</a>

        <script>
            fetch('/api/json')
                .then(response => response.json())
                .then(data => {
                    document.body.innerHTML += `<p>API says: ${data.myVar}</p>`;
                })
                .catch(error => console.error(`<p>Error fetching API:</p>`, error));
        </script>
    </body>
</html>
