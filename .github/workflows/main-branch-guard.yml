name: Restrict PR source to dev

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR is from dev
        run: |
          if [[ "${{ github.head_ref }}" != "dev" ]]; then
            echo "Pull requests into main must come from dev."
            exit 1
          fi