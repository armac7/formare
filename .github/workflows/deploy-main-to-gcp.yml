name: deploy-main-to-gcp.yml

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/gcp_deploy_key
          chmod 600 ~/.ssh/gcp_deploy_key

          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/gcp_deploy_key

          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        shell: bash
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_DIR:  ${{ vars.APP_DIR }}
          PM2_NAME: ${{ vars.PM2_NAME }}
        run: |
          ssh -i ~/.ssh/gcp_deploy_key -tt "$SSH_USER@$SSH_HOST" <<EOF
            set -e

            sudo su - w_mcd0320
            cd "$APP_DIR"

            git fetch origin
            git reset --hard origin/main
            git clean -fd

            cd client
            npm i
            npm run build
            cd ..
            cd server
            npm i

            pm2 delete "$PM2_NAME" || true
            pm2 start -f app.js --name "$PM2_NAME"

            pm2 save
          EOF